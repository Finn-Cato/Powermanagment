<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:var(--homey-font-family,-apple-system,sans-serif); color:var(--homey-text-color); background:var(--homey-background-color); }
    .wrap { padding:var(--homey-su-3,12px) var(--homey-su-4,16px); display:flex; flex-direction:column; gap:var(--homey-su-3,12px); }
    .section-title { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.05em; color:var(--homey-text-color-light,#888); }
    .status-row { display:flex; align-items:center; justify-content:space-between; }
    .power-val { font-size:26px; font-weight:700; }
    .limit-val { font-size:12px; color:var(--homey-text-color-light,#888); }
    .badge { font-size:11px; font-weight:600; padding:3px 10px; border-radius:99px; }
    .divider { height:1px; background:var(--homey-line-color,rgba(0,0,0,.1)); }
    .device-list { display:flex; flex-direction:column; gap:4px; }
    .device-row { display:flex; align-items:center; justify-content:space-between; font-size:12px; }
    .device-name { flex:1; }
    .device-result { font-size:10px; color:var(--homey-text-color-light,#888); text-align:right; max-width:160px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; margin-right:6px; }
    .empty { font-size:12px; color:var(--homey-text-color-light,#888); }
  </style>
</head>
<body class="homey-widget">
  <div class="wrap" id="root"><div style="color:var(--homey-text-color-light);font-size:13px;">Laster...</div></div>
  <script>
    function onHomeyReady(Homey) {
      function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
      function fmtW(w) { return w>=1000?(w/1000).toFixed(1)+' kW':w+' W'; }

      var actionLabels = {
        'turn_off':  'Slå av',
        'turn_on':   'Slå på',
        'dim':       'Dim',
        'setpoint_-2': '-2°C',
        'setpoint_-1': '-1°C',
        'setpoint_+1': '+1°C',
        'setpoint_+2': '+2°C',
      };
      function fmtAction(a) { return actionLabels[a] || a || '–'; }

      function render(d) {
        var root = document.getElementById('root');
        if (!d) { root.innerHTML = '<div class="empty">Ingen data</div>'; return; }

        var pct = d.limitW > 0 ? Math.min(d.currentPowerW / d.limitW, 1) : 0;
        var overLimit = d.currentPowerW > d.limitW;
        var powerCol = overLimit
          ? 'var(--homey-color-red-500,#ff3b30)'
          : pct > 0.9 ? 'var(--homey-color-orange-500,#ff9500)'
          : 'var(--homey-color-green-500,#34c759)';
        var mitigated = d.mitigatedDevices || [];
        var scan = d.lastMitigationScan || [];
        var pList = d.priorityList || [];

        // Build lookup: deviceId → last scan result
        var scanByName = {};
        scan.forEach(function(item) { scanByName[item.name] = item; });

        // Build lookup: deviceId → mitigated info
        var mitigatedById = {};
        mitigated.forEach(function(m) { mitigatedById[m.deviceId] = m; });

        var html = '<div class="section-title">🛡 Mitigering</div>';

        // ── Power status ───────────────────────────────────────────────
        html += '<div class="status-row">';
        html += '<div><div class="power-val" style="color:'+powerCol+';">'+fmtW(d.currentPowerW)+'</div>'
             +  '<div class="limit-val">Grense: '+fmtW(d.limitW)+'</div></div>';
        if (overLimit) {
          html += '<span class="badge" style="background:rgba(255,59,48,.12);color:var(--homey-color-red-500,#ff3b30);">Over grense</span>';
        } else if (mitigated.length) {
          html += '<span class="badge" style="background:rgba(255,149,0,.12);color:var(--homey-color-orange-500,#ff9500);">'+mitigated.length+' redusert</span>';
        } else {
          html += '<span class="badge" style="background:rgba(52,199,89,.12);color:var(--homey-color-green-500,#34c759);">OK</span>';
        }
        html += '</div>';

        html += '<div class="divider"></div>';

        // ── Priority list ──────────────────────────────────────────────
        if (pList.length) {
          html += '<div class="section-title">Enheter i prioritetsliste</div>';
          html += '<div class="device-list">';
          pList.forEach(function(entry) {
            var isMit = !!mitigatedById[entry.deviceId];
            var scanItem = scanByName[entry.name];
            var lastResult = scanItem ? scanItem.result : null;

            // State indicator
            var dotCol, stateLabel;
            if (!entry.enabled) {
              dotCol = 'var(--homey-text-color-light,#888)';
              stateLabel = 'Deaktivert';
            } else if (isMit) {
              dotCol = 'var(--homey-color-orange-500,#ff9500)';
              stateLabel = 'Redusert';
            } else if (lastResult && lastResult.indexOf('SUCCESS') >= 0) {
              dotCol = 'var(--homey-color-orange-500,#ff9500)';
              stateLabel = 'Aktiv';
            } else {
              dotCol = 'var(--homey-color-green-500,#34c759)';
              stateLabel = 'Ledig';
            }

            html += '<div class="device-row">';
            html += '<div class="dot" style="background:'+dotCol+';"></div>';
            html += '<div style="flex:1;min-width:0;">'
                 +  '<div style="font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+esc(entry.name)+'</div>'
                 +  '<div style="font-size:10px;color:var(--homey-text-color-light,#888);">'+fmtAction(entry.action)+'</div>'
                 +  '</div>';
            html += '<span style="font-size:10px;color:'+(isMit?'var(--homey-color-orange-500,#ff9500)':'var(--homey-text-color-light,#888)')+';white-space:nowrap;flex-shrink:0;">'+stateLabel+'</span>';
            html += '</div>';
          });
          html += '</div>';
        } else {
          html += '<div class="empty">Ingen enheter i prioritetsliste</div>';
        }

        // ── Last scan (collapsed summary) ─────────────────────────────
        if (scan.length) {
          html += '<div class="divider"></div>';
          html += '<div class="section-title">Siste skanning</div>';
          html += '<div class="device-list">';
          scan.forEach(function(item) {
            var res = (item.result||'');
            var dotCol = res.indexOf('SUCCESS') >= 0 ? 'var(--homey-color-orange-500,#ff9500)'
                       : res.indexOf('idle') >= 0 ? 'var(--homey-text-color-light,#888)'
                       : res.indexOf('error') >= 0 ? 'var(--homey-color-red-500,#ff3b30)'
                       : 'var(--homey-text-color-light,#888)';
            var label = res === 'SUCCESS' ? 'Mitigert'
                      : res === 'already mitigated' ? 'Allerede redusert'
                      : res === 'disabled' ? 'Deaktivert'
                      : res === 'idle-skip' ? 'Ledig'
                      : res === 'ev_charger (handled separately)' ? 'EV-lader'
                      : res.indexOf('min runtime') >= 0 ? 'Min-tid ikke nådd'
                      : res.indexOf('error') >= 0 ? 'Feil' : res;
            html += '<div class="device-row">'
                 +  '<div class="dot" style="background:'+dotCol+';"></div>'
                 +  '<span class="device-name">'+esc(item.name)+'</span>'
                 +  '<span class="device-result">'+esc(label)+'</span>'
                 +  '</div>';
          });
          html += '</div>';
        }

        root.innerHTML = html;
        Homey.setHeight(root.scrollHeight + 24);
      }

      function refresh() { Homey.api('GET','/',{}).then(render).catch(function(){}); }
      refresh();
      setInterval(refresh, 5000);
      Homey.ready();
    }
  </script>
</body>
</html>
